[versions]
cdkVersion = "2.211.0"
kotlinVersion = "2.2.10"
kotlinSerializationVersion = "1.5.20"
awsSdk = "2.39.4"

[libraries]

aws-cdk = { module="software.amazon.awscdk:aws-cdk-lib", version.ref = "cdkVersion" }
aws-java-core = { module="com.amazonaws:aws-lambda-java-core", version="1.2.1" }
aws-java-eventbridge = { module="com.amazonaws:aws-java-sdk-eventbridge", version="1.12.794" }
aws-java-events = { module="com.amazonaws:aws-lambda-java-events", version="3.11.0" }
aws-java-sdk-xray = { module="com.amazonaws:aws-java-sdk-xray", version="1.12.793" }
aws-lambda-java-tests = { module="com.amazonaws:aws-lambda-java-tests", version="1.1.2" }
aws-sdk-bom = { module="software.amazon.awssdk:bom", version.ref = "awsSdk" }
aws-sdk-dynamodb = { module = "software.amazon.awssdk:dynamodb" }
aws-sdk-dynamodb-enhanced = { module = "software.amazon.awssdk:dynamodb-enhanced" }
aws-sdk-lambda = { module = "software.amazon.awssdk:lambda" }
aws-xray-recorder-sdk-aws-sdk-v2 = { module="com.amazonaws:aws-xray-recorder-sdk-aws-sdk-v2", version="2.20.0" }
kotlin-stdlib = { module="org.jetbrains.kotlin:kotlin-stdlib", version.ref="kotlinVersion" }
kotlinx-serialization-json = { module="org.jetbrains.kotlinx:kotlinx-serialization-json", version="1.9.0" }
mockk = { module="io.mockk:mockk", version="1.14.6" }

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlinVersion" }
serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlinVersion" }
shadow = { id = "com.gradleup.shadow", version = "9.0.2"}

[bundles]
